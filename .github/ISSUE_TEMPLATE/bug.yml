name: Bug
description: Report something that is broken or incorrect
title: "Bug: "
labels:
  - bug
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What happened?
      placeholder: "Short, clear description of the issue."
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Steps To Reproduce
      description: How can we reproduce the problem?
      placeholder: |
        1.
        2.
        3.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      placeholder: "What should have happened?"
    validations:
      required: false
  - type: textarea
    id: context
    attributes:
      label: Context
      description: Environment, logs, screenshots, etc.
      placeholder: "OS, version, commit, logs..."
    validations:
      required: false
