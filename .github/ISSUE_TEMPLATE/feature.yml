name: Feature
description: Suggest a new capability or improvement
title: "Feature: "
labels:
  - feature
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem / Opportunity
      description: What pain point or opportunity does this address?
      placeholder: "Describe the current gap or user need."
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposal
      description: What should we build or change?
      placeholder: "Outline the proposed solution."
    validations:
      required: true
  - type: textarea
    id: success
    attributes:
      label: Success Criteria
      description: How will we know this is done?
      placeholder: "- [ ] ..."
    validations:
      required: false
