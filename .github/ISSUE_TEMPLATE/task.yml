name: Task
description: Track a discrete piece of work
title: "Task: "
labels:
  - task
body:
  - type: textarea
    id: goal
    attributes:
      label: Goal
      description: What needs to be done?
      placeholder: "Describe the task and desired outcome."
    validations:
      required: true
  - type: textarea
    id: scope
    attributes:
      label: Scope / Notes
      description: Constraints, dependencies, or context.
      placeholder: "- Depends on #\n- Out of scope:"
    validations:
      required: false
  - type: textarea
    id: checklist
    attributes:
      label: Checklist
      description: Optional breakdown of steps.
      placeholder: "- [ ] "
    validations:
      required: false
