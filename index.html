<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mitarbeiterprofil: Max Mustermann</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        html, body {
            margin: 0;
            padding: 0;
            height: 100%;
        }
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            display: flex;
            flex-direction: column;
            transition: background-color 0.2s, color 0.2s;
        }
        h1 {
            margin: 8px 0;
            white-space: pre-line;
            flex-shrink: 0;
        }
        #chartContainer {
            flex: 1;
            position: relative;
            min-height: 0;
        }
    </style>
</head>
<body>
    <h1>Mitarbeiterprofil: Max Mustermann</h1>
    <div id="chartContainer">
        <canvas id="radarChart"></canvas>
    </div>
    <script>
        // ---------------------------------------------------------------------------
        // Theme
        // ---------------------------------------------------------------------------

        function isDarkMode() {
            return window.matchMedia('(prefers-color-scheme: dark)').matches;
        }

        function getTheme() {
            const dark = isDarkMode();
            return {
                bg:          dark ? '#1a1a1a' : '#f4f4f4',
                text:        dark ? '#e0e0e0' : '#333333',
                subtext:     dark ? '#aaaaaa' : '#555555',
                gridColor:   dark ? 'rgba(255,255,255,0.15)' : 'rgba(0,0,0,0.1)',
                angleColor:  dark ? 'rgba(255,255,255,0.15)' : 'rgba(0,0,0,0.1)',
                tickBg:      dark ? '#1a1a1a' : '#f4f4f4',
                colors: dark ? [
                    { bg: 'rgba(100, 180, 255, 0.25)', border: 'rgba(100, 180, 255, 1)'  },
                    { bg: 'rgba(255, 130, 160, 0.25)', border: 'rgba(255, 130, 160, 1)'  },
                    { bg: 'rgba(80,  210, 200, 0.25)', border: 'rgba(80,  210, 200, 1)'  },
                    { bg: 'rgba(255, 190,  90, 0.25)', border: 'rgba(255, 190,  90, 1)'  },
                ] : [
                    { bg: 'rgba(54,  162, 235, 0.2)',  border: 'rgba(54,  162, 235, 1)'  },
                    { bg: 'rgba(255,  99, 132, 0.2)',  border: 'rgba(255,  99, 132, 1)'  },
                    { bg: 'rgba(75,  192, 192, 0.2)',  border: 'rgba(75,  192, 192, 1)'  },
                    { bg: 'rgba(255, 159,  64, 0.2)',  border: 'rgba(255, 159,  64, 1)'  },
                ]
            };
        }

        function applyTheme(theme) {
            document.body.style.backgroundColor = theme.bg;
            document.body.style.color = theme.text;
            document.querySelector('h1').style.color = theme.subtext;
        }

        // ---------------------------------------------------------------------------
        // Farbpalette & Profil
        // ---------------------------------------------------------------------------

        const defaultProfile = {
            name: 'Mitarbeiterprofil: Max Mustermann',
            dimensions: ['Kommunikation', 'Teamarbeit', 'Fachwissen', 'Eigenverantwortung', 'Problemlösung', 'Führung'],
            datasets: [{ label: 'Bewertung', values: [4, 5, 3, 4, 4, 2] }]
        };

        // ---------------------------------------------------------------------------
        // URL-Parameter
        // ---------------------------------------------------------------------------

        // values unterstützt mehrere Datensätze via | als Trennzeichen: values=5,2,3|4,1,2
        // labels benennt die Datensätze (kommagetrennt): labels=Person1,Person2
        function parseURLParams() {
            const urlParams = new URLSearchParams(window.location.search);
            const rawValues = urlParams.get('values');
            const rawLabels = urlParams.get('labels');

            let valueSets = null;
            if (rawValues) {
                valueSets = rawValues.split('|').map(set => set.split(',').map(v => parseFloat(v)));
            }

            return {
                name:       urlParams.get('name'),
                dimensions: urlParams.get('dimensions') ? urlParams.get('dimensions').split(',') : null,
                valueSets,
                labels:     rawLabels ? rawLabels.split(',') : null
            };
        }

        // ---------------------------------------------------------------------------
        // Label-Formatierung
        // ---------------------------------------------------------------------------

        // Chart.js erwartet für mehrzeilige Labels ein Array von Strings
        function formatLabel(label) {
            const MAX_LINE = 15;
            if (label.length <= MAX_LINE) return label;

            const words = label.split(' ');
            const lines = [];
            let current = '';
            for (const word of words) {
                if (!current) {
                    current = word;
                } else if ((current + ' ' + word).length <= MAX_LINE) {
                    current += ' ' + word;
                } else {
                    lines.push(current);
                    current = word;
                }
            }
            lines.push(current);

            const result = [];
            for (const line of lines) {
                if (line.length <= MAX_LINE) {
                    result.push(line);
                } else {
                    const mid = Math.floor(line.length / 2);
                    const hyphenIdx = line.lastIndexOf('-', mid + 3);
                    if (hyphenIdx > 0) {
                        result.push(line.slice(0, hyphenIdx + 1));
                        result.push(line.slice(hyphenIdx + 1));
                    } else {
                        result.push(line);
                    }
                }
            }
            return result;
        }

        // ---------------------------------------------------------------------------
        // Profil-Normalisierung
        // ---------------------------------------------------------------------------

        function normalizeProfile(params) {
            let profile = {
                name:       defaultProfile.name,
                dimensions: defaultProfile.dimensions,
                datasets:   defaultProfile.datasets
            };

            if (params.name) {
                profile.name = params.name;
            }

            if (params.dimensions && params.valueSets) {
                const dimCount = params.dimensions.length;
                const allValid = params.valueSets.every(set =>
                    set.length === dimCount && set.every(v => !isNaN(v) && v >= 0 && v <= 5)
                );

                if (allValid) {
                    profile.dimensions = params.dimensions.map(formatLabel);
                    profile.datasets = params.valueSets.map((values, i) => ({
                        label: params.labels?.[i] ?? `Datensatz ${i + 1}`,
                        values
                    }));
                } else {
                    console.warn('Ungültige URL-Parameter: Alle Value-Sets müssen zur Anzahl der Dimensions passen und Werte zwischen 0-5 sein. Verwende Defaults.');
                }
            } else if (params.dimensions || params.valueSets) {
                console.warn('Unvollständige URL-Parameter: Beide dimensions und values müssen gesetzt sein. Verwende Defaults.');
            }

            return profile;
        }

        // ---------------------------------------------------------------------------
        // Titel
        // ---------------------------------------------------------------------------

        function setTitle(name) {
            document.querySelector('h1').textContent = name.replace(': ', ':\n');
            document.title = name;
        }

        // ---------------------------------------------------------------------------
        // Chart
        // ---------------------------------------------------------------------------

        let chartInstance = null;

        function buildChartConfig(dimensions, datasets, theme) {
            return {
                type: 'radar',
                data: {
                    labels: dimensions,
                    datasets: datasets.map((ds, i) => {
                        const color = theme.colors[i % theme.colors.length];
                        return {
                            label:                    ds.label,
                            data:                     ds.values,
                            backgroundColor:          color.bg,
                            borderColor:              color.border,
                            borderWidth:              2,
                            pointBackgroundColor:     color.border,
                            pointBorderColor:         theme.bg,
                            pointHoverBackgroundColor: theme.bg,
                            pointHoverBorderColor:    color.border
                        };
                    })
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: {
                            display: datasets.length > 1,
                            labels: { color: theme.text }
                        }
                    },
                    scales: {
                        r: {
                            min: 0,
                            max: 5,
                            ticks: {
                                stepSize: 1,
                                color:    theme.subtext,
                                backdropColor: theme.tickBg
                            },
                            grid:         { color: theme.gridColor },
                            angleLines:   { color: theme.angleColor },
                            pointLabels:  { color: theme.text }
                        }
                    }
                }
            };
        }

        function renderChart(dimensions, datasets) {
            const theme = getTheme();
            applyTheme(theme);

            if (chartInstance) {
                chartInstance.destroy();
            }

            const ctx = document.getElementById('radarChart').getContext('2d');
            chartInstance = new Chart(ctx, buildChartConfig(dimensions, datasets, theme));
        }

        // ---------------------------------------------------------------------------
        // Hauptlogik
        // ---------------------------------------------------------------------------

        const params  = parseURLParams();
        const profile = normalizeProfile(params);
        setTitle(profile.name);
        renderChart(profile.dimensions, profile.datasets);

        // Theme-Wechsel zur Laufzeit (z. B. System wechselt von hell nach dunkel)
        window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', () => {
            renderChart(profile.dimensions, profile.datasets);
        });
    </script>
</body>
</html>
